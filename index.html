<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>진달래꽃</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Noto Serif KR", serif;
        background: linear-gradient(135deg, #f8dce8, #fff8f2);
        color: #333;
        line-height: 1.8;
      }

      header {
        text-align: center;
        padding: 70px 20px 40px;
      }

      header h1 {
        font-size: 3rem;
        color: #b8325f;
        margin-bottom: 10px;
      }

      header p {
        font-size: 1.1rem;
        color: #666;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 30px 20px 80px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 30px;
      }

      .card {
        background: rgba(255, 255, 255, 0.85);
        border-radius: 24px;
        padding: 35px;
        box-shadow: 0 10px 30px rgba(184, 50, 95, 0.15);
      }

      .poem h2,
      .reaction h2 {
        color: #b8325f;
        margin-bottom: 20px;
        font-size: 1.6rem;
      }

      .poem p {
        white-space: pre-line;
        font-size: 1.05rem;
      }

      .reaction textarea {
        width: 100%;
        height: 180px;
        resize: none;
        border: 1px solid #e5a8bf;
        border-radius: 16px;
        padding: 15px;
        font-size: 1rem;
        font-family: inherit;
        outline: none;
        background: #fffafa;
      }

      .reaction textarea:focus {
        border-color: #b8325f;
        box-shadow: 0 0 0 3px rgba(184, 50, 95, 0.15);
      }

      button {
        margin-top: 15px;
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 14px;
        background: #b8325f;
        color: white;
        font-size: 1rem;
        cursor: pointer;
      }

      button:hover {
        background: #94284d;
      }

      .result {
        margin-top: 20px;
        padding: 18px;
        border-radius: 16px;
        background: #fff0f5;
        color: #444;
        min-height: 60px;
      }

      footer {
        text-align: center;
        padding: 25px;
        color: #777;
        font-size: 0.9rem;
      }

      @media (max-width: 768px) {
        header h1 {
          font-size: 2.2rem;
        }

        .container {
          grid-template-columns: 1fr;
        }

        .card {
          padding: 25px;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>진달래꽃</h1>
    </header>

    <main class="container">
      <section class="card poem">
        <p>
          나 보기가 역겨워 가실 때에는 말없이 고이 보내 드리오리다 영변에 약산
          진달래꽃 아름 따다 가실 길에 뿌리오리다 가시는 걸음 걸음 놓인 그 꽃을
          사뿐히 즈려 밟고 가시옵소서 나 보기가 역겨워 가실 때에는 죽어도 아니
          눈물 흘리오리다
        </p>
      </section>
    </main>
  </body>
</html>
